# Single-service stack. SQLite lives on a named volume so history survives
# rebuilds. Public exposure on pi5-ai2 is handled by the noBGP proxy (M6).
services:
  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:///./data/prices.db
    volumes:
      - app_data:/app/data
    ports:
      - "8000:8000"
    # A crashed process is restarted by this policy; a *hung* process is
    # caught by the healthcheck and restarted by the autoheal sidecar
    # (Docker itself never restarts unhealthy containers).
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).getcode()==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      autoheal: "true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  app_data:
